apiVersion: apps/v1
kind: Deployment
metadata:
  name: be4after-api-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: be4after-api
  template:
    metadata:
      labels:
        app: be4after-api
    spec:
      containers:
      - name: be4after-api
        image: be4after-api:1.0
        env:
          - name: BUILD_PROFILE
            value: dev
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
        ports:
        - containerPort: 8088
        # 컨테이너 안에서 애플리케이션이 시작되었는지 확인한다.
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8088
          # 실패를 허용하는 최대 횟수
          failureThreshold: 10
          # 10초마다 상태를 확인
          periodSeconds: 10
        # 컨테이너 안의 애플리케이션이 살아있는지 지속적으로 확인한다.
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8088
          # 시작 지연시간
          initialDelaySeconds: 10
          periodSeconds: 20
        # 컨테이너 안의 애프리케이션이 실제로 서비스 요청에 응답할 수 있는지 확인한다.
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8088
          initialDelaySeconds: 5
          periodSeconds: 5
          
